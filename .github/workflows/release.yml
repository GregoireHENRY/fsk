name: Build wheels

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels
          path: dist